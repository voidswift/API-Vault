name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Dependencies
      run: flutter pub get

    - name: Format
      run: dart format --output=none --set-exit-if-changed .

    - name: Analyze
      run: flutter analyze --fatal-infos --fatal-warnings

    - name: Run Tests
      run: flutter test
